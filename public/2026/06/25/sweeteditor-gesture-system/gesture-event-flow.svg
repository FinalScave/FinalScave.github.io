<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">SweetEditor 手势链路</title>
  <desc id="desc">展示 SweetEditor 从平台屏幕事件到 GestureHandler、EditorInteraction、TextLayout 和 EditorActionResult 的分层链路。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .box-title { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; }
      .mono { font: 600 13px Consolas, "Microsoft YaHei", monospace; fill: #0f172a; }
      .note { font: 400 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.4; }
      .platform { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; }
      .handler { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.6; }
      .interaction { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.6; }
      .layout { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.6; }
      .result { fill: #fdf2f8; stroke: #db2777; stroke-width: 1.6; }
      .warn { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.4; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .red-line { stroke: #dc2626; stroke-width: 2.6; fill: none; marker-end: url(#arrow-red); }
      .gray-line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow-gray); stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="20" fill="#fbfaf7"/>
  <text x="640" y="56" text-anchor="middle" class="title">SweetEditor 手势系统：从屏幕事件到编辑语义</text>
  <text x="640" y="88" text-anchor="middle" class="subtitle">平台只提交输入事实，Core 结合布局、选区和装饰元素解释真实编辑行为</text>

  <rect x="60" y="126" width="1160" height="468" rx="18" class="panel"/>

  <rect x="94" y="168" width="178" height="336" rx="14" class="platform"/>
  <text x="183" y="204" text-anchor="middle" class="lane-title">Platform Event</text>
  <text x="183" y="239" text-anchor="middle" class="small">Mouse / Touch</text>
  <text x="183" y="263" text-anchor="middle" class="small">Wheel / Right Click</text>
  <text x="183" y="287" text-anchor="middle" class="small">Direct Scroll / Scale</text>
  <rect x="122" y="330" width="122" height="86" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="183" y="360" text-anchor="middle" class="mono">GestureEvent</text>
  <text x="183" y="385" text-anchor="middle" class="small">points / delta</text>
  <text x="183" y="407" text-anchor="middle" class="small">modifiers</text>

  <rect x="327" y="168" width="190" height="336" rx="14" class="handler"/>
  <text x="422" y="204" text-anchor="middle" class="lane-title">GestureHandler</text>
  <text x="422" y="238" text-anchor="middle" class="small">只识别物理手势</text>
  <text x="422" y="263" text-anchor="middle" class="small">时间 / 距离 / 指针数</text>
  <rect x="354" y="304" width="136" height="154" rx="10" fill="#fffaf0" stroke="#fbbf24"/>
  <text x="422" y="333" text-anchor="middle" class="mono">GestureType</text>
  <text x="422" y="359" text-anchor="middle" class="small">Tap / DoubleTap</text>
  <text x="422" y="381" text-anchor="middle" class="small">LongPress / Drag</text>
  <text x="422" y="403" text-anchor="middle" class="small">Scroll / Scale</text>
  <text x="422" y="425" text-anchor="middle" class="small">FastScroll</text>

  <rect x="572" y="148" width="214" height="376" rx="14" class="interaction"/>
  <text x="679" y="184" text-anchor="middle" class="lane-title">EditorInteraction</text>
  <text x="679" y="216" text-anchor="middle" class="small">把物理手势放回上下文</text>
  <rect x="598" y="248" width="162" height="56" rx="10" fill="#ffffff" stroke="#93c5fd"/>
  <text x="679" y="274" text-anchor="middle" class="box-title">优先消费</text>
  <text x="679" y="296" text-anchor="middle" class="small">Scrollbar / Handle</text>
  <rect x="598" y="328" width="162" height="74" rx="10" fill="#ffffff" stroke="#93c5fd"/>
  <text x="679" y="356" text-anchor="middle" class="box-title">解释意图</text>
  <text x="679" y="380" text-anchor="middle" class="small">place cursor / select</text>
  <text x="679" y="400" text-anchor="middle" class="small">toggle fold / menu</text>
  <rect x="598" y="426" width="162" height="56" rx="10" fill="#ffffff" stroke="#93c5fd"/>
  <text x="679" y="452" text-anchor="middle" class="box-title">维护动画</text>
  <text x="679" y="474" text-anchor="middle" class="small">edge scroll / fling</text>

  <rect x="844" y="168" width="196" height="336" rx="14" class="layout"/>
  <text x="942" y="204" text-anchor="middle" class="lane-title">TextLayout</text>
  <text x="942" y="236" text-anchor="middle" class="small">三种命中语义</text>
  <rect x="870" y="274" width="144" height="52" rx="9" fill="#ffffff" stroke="#86efac"/>
  <text x="942" y="305" text-anchor="middle" class="mono">hitTestPointer</text>
  <rect x="870" y="348" width="144" height="52" rx="9" fill="#ffffff" stroke="#86efac"/>
  <text x="942" y="379" text-anchor="middle" class="mono">hitTestBoundary</text>
  <rect x="870" y="422" width="144" height="52" rx="9" fill="#ffffff" stroke="#86efac"/>
  <text x="942" y="453" text-anchor="middle" class="mono">hitTestDecoration</text>

  <rect x="1090" y="168" width="92" height="336" rx="14" class="result"/>
  <text x="1136" y="204" text-anchor="middle" class="lane-title">Core</text>
  <text x="1136" y="244" text-anchor="middle" class="small">Cursor</text>
  <text x="1136" y="270" text-anchor="middle" class="small">Selection</text>
  <text x="1136" y="296" text-anchor="middle" class="small">Scroll</text>
  <text x="1136" y="322" text-anchor="middle" class="small">Scale</text>
  <text x="1136" y="348" text-anchor="middle" class="small">HitTarget</text>
  <text x="1136" y="374" text-anchor="middle" class="small">CursorType</text>
  <text x="1136" y="425" text-anchor="middle" class="mono">ActionResult</text>

  <path class="line" d="M 272 336 H 319"/>
  <path class="line" d="M 517 336 H 564"/>
  <path class="line" d="M 786 336 H 836"/>
  <path class="line" d="M 1040 336 H 1082"/>

  <path class="red-line" d="M 760 276 C 820 536 1018 548 1132 448"/>
  <text x="808" y="564" text-anchor="middle" class="note">scrollbar / handle drag 会提前改写选择或滚动，不进入普通 tap 语义</text>

  <path class="gray-line" d="M 1140 504 C 1120 642 630 650 650 488"/>
  <text x="874" y="674" text-anchor="middle" class="note">needs_edge_scroll / needs_fling 由 Core 返回，平台按结果继续驱动动画</text>

  <rect x="160" y="624" width="960" height="54" rx="12" class="warn"/>
  <text x="640" y="657" text-anchor="middle" class="small">关键边界：平台不要提前解释“点中了什么”，否则 CodeLens、Link、Fold、Selection Handle 会在各端分叉</text>
</svg>
