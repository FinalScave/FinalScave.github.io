<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">一个好 skill 的基本结构</title>
  <desc id="desc">展示 skill 由触发描述、主工作流、按需资源和验证迭代组成。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 400 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; }
      .mono { font: 600 14px Consolas, "Microsoft YaHei", monospace; fill: #0f172a; }
      .note { font: 400 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.4; }
      .trigger { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.7; }
      .workflow { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.7; }
      .resource { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.7; }
      .validate { fill: #fdf2f8; stroke: #db2777; stroke-width: 1.7; }
      .inner { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .blue-line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .green-line { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .gray-line { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow-gray); stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="20" fill="#fbfaf7"/>
  <text x="640" y="58" text-anchor="middle" class="title">一个好 Skill 的基本结构</text>
  <text x="640" y="91" text-anchor="middle" class="subtitle">不要把所有知识塞进主文件，让 Agent 按任务逐层加载需要的上下文</text>

  <rect x="62" y="130" width="1156" height="456" rx="20" class="panel"/>

  <rect x="100" y="190" width="230" height="270" rx="16" class="trigger"/>
  <text x="215" y="230" text-anchor="middle" class="box-title">触发层</text>
  <text x="215" y="263" text-anchor="middle" class="mono">name / description</text>
  <rect x="128" y="302" width="174" height="98" rx="12" class="inner"/>
  <text x="215" y="332" text-anchor="middle" class="small">任务对象</text>
  <text x="215" y="357" text-anchor="middle" class="small">触发场景</text>
  <text x="215" y="382" text-anchor="middle" class="small">排除边界</text>

  <rect x="400" y="160" width="252" height="330" rx="16" class="workflow"/>
  <text x="526" y="202" text-anchor="middle" class="box-title">执行层</text>
  <text x="526" y="234" text-anchor="middle" class="mono">SKILL.md</text>
  <rect x="428" y="270" width="196" height="148" rx="12" class="inner"/>
  <text x="526" y="304" text-anchor="middle" class="small">工作流</text>
  <text x="526" y="334" text-anchor="middle" class="small">硬规则</text>
  <text x="526" y="364" text-anchor="middle" class="small">读取条件</text>
  <text x="526" y="394" text-anchor="middle" class="small">输出要求</text>

  <rect x="722" y="160" width="278" height="330" rx="16" class="resource"/>
  <text x="861" y="202" text-anchor="middle" class="box-title">资源层</text>
  <text x="861" y="234" text-anchor="middle" class="mono">references / scripts / assets</text>
  <rect x="750" y="270" width="222" height="52" rx="10" class="inner"/>
  <text x="861" y="303" text-anchor="middle" class="small">规则、API、风格画像</text>
  <rect x="750" y="342" width="222" height="52" rx="10" class="inner"/>
  <text x="861" y="375" text-anchor="middle" class="small">索引、解析、构建脚本</text>
  <rect x="750" y="414" width="222" height="52" rx="10" class="inner"/>
  <text x="861" y="447" text-anchor="middle" class="small">模板、图片、项目骨架</text>

  <rect x="1060" y="190" width="120" height="270" rx="16" class="validate"/>
  <text x="1120" y="230" text-anchor="middle" class="box-title">验证</text>
  <text x="1120" y="276" text-anchor="middle" class="small">真实任务</text>
  <text x="1120" y="306" text-anchor="middle" class="small">构建检查</text>
  <text x="1120" y="336" text-anchor="middle" class="small">渲染检查</text>
  <text x="1120" y="366" text-anchor="middle" class="small">失败回流</text>

  <path class="blue-line" d="M 330 325 H 392"/>
  <path class="blue-line" d="M 652 325 H 714"/>
  <path class="green-line" d="M 1000 325 H 1052"/>
  <path class="gray-line" d="M 1120 460 C 1100 642 494 642 526 492"/>

  <rect x="196" y="622" width="888" height="54" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="640" y="655" text-anchor="middle" class="note">核心判断：主文件负责路由和红线，细节按需读取，脆弱动作脚本化，真实失败再回流更新</text>
</svg>
