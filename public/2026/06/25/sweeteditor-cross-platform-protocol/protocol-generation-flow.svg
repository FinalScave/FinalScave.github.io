<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">SweetEditor CoreProtocol 生成流程</title>
  <desc id="desc">C++ 协议标注经过 schema 提取、snapshot 和 golden 校验，再生成各平台的 CoreProtocol 与模型文件。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .source { fill: #eef8f0; stroke: #58ad73; stroke-width: 2; rx: 10; }
      .tool { fill: #fff7e8; stroke: #e5a84a; stroke-width: 2; rx: 10; }
      .check { fill: #f2efff; stroke: #8d77d2; stroke-width: 2; rx: 10; }
      .target { fill: #edf6ff; stroke: #77aee8; stroke-width: 2; rx: 10; }
      .std { fill: #ffffff; stroke: #d9dee8; stroke-width: 2; rx: 10; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .h { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #111827; }
      .t { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; fill: #1f2937; }
      .arrow { stroke: #596273; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8b95a7; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#596273"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="650"/>
  <text x="600" y="52" text-anchor="middle" class="title">跨平台协议的收敛路径</text>
  <text x="600" y="82" text-anchor="middle" class="subtitle">公共类型从 C++ 标注生成到所有平台，减少手写对齐漂移</text>

  <rect x="80" y="145" width="210" height="110" class="source"/>
  <text x="185" y="178" text-anchor="middle" class="h">C++ 协议源</text>
  <text x="185" y="205" text-anchor="middle" class="mono">SE_PROTOCOL_*</text>
  <text x="185" y="228" text-anchor="middle" class="t">foundation / visual</text>
  <text x="185" y="248" text-anchor="middle" class="t">ime / adornment / action</text>

  <rect x="360" y="145" width="200" height="110" class="tool"/>
  <text x="460" y="178" text-anchor="middle" class="h">Schema 提取</text>
  <text x="460" y="205" text-anchor="middle" class="mono">se_protocol_gen</text>
  <text x="460" y="228" text-anchor="middle" class="t">字段顺序 / 宽度</text>
  <text x="460" y="248" text-anchor="middle" class="t">枚举值 / map 布局</text>

  <rect x="630" y="145" width="200" height="110" class="check"/>
  <text x="730" y="178" text-anchor="middle" class="h">校验层</text>
  <text x="730" y="205" text-anchor="middle" class="mono">snapshot</text>
  <text x="730" y="228" text-anchor="middle" class="mono">golden fixtures</text>
  <text x="730" y="248" text-anchor="middle" class="t">防止静默漂移</text>

  <rect x="900" y="145" width="220" height="110" class="target"/>
  <text x="1010" y="178" text-anchor="middle" class="h">多后端生成</text>
  <text x="1010" y="205" text-anchor="middle" class="t">C++ / Java / ETS</text>
  <text x="1010" y="228" text-anchor="middle" class="t">Swift / C# / Dart</text>
  <text x="1010" y="248" text-anchor="middle" class="t">同一份 CoreProtocol</text>

  <path d="M290 200 L360 200" class="arrow"/>
  <path d="M560 200 L630 200" class="arrow"/>
  <path d="M830 200 L900 200" class="arrow"/>

  <rect x="120" y="355" width="960" height="120" class="std"/>
  <text x="600" y="388" text-anchor="middle" class="h">平台实现标准把协议边界写成约束</text>
  <text x="600" y="418" text-anchor="middle" class="t">平台可以有自己的 UI、生命周期和绘制方式，但不能维护私有二进制 schema。</text>
  <text x="600" y="444" text-anchor="middle" class="t">新增公共能力时，先改 C++ 协议类型，再同步生成所有平台模型和 codec。</text>

  <g>
    <rect x="130" y="520" width="145" height="50" class="target"/>
    <text x="202" y="551" text-anchor="middle" class="mono">Android Java</text>
    <rect x="300" y="520" width="145" height="50" class="target"/>
    <text x="372" y="551" text-anchor="middle" class="mono">Swing Java</text>
    <rect x="470" y="520" width="145" height="50" class="target"/>
    <text x="542" y="551" text-anchor="middle" class="mono">OHOS ETS</text>
    <rect x="640" y="520" width="145" height="50" class="target"/>
    <text x="712" y="551" text-anchor="middle" class="mono">Apple Swift</text>
    <rect x="810" y="520" width="145" height="50" class="target"/>
    <text x="882" y="551" text-anchor="middle" class="mono">C#</text>
    <rect x="980" y="520" width="95" height="50" class="target"/>
    <text x="1027" y="551" text-anchor="middle" class="mono">Dart</text>
  </g>
</svg>
